[package]
name = "arora-integration-tests"
version = "0.0.0"
edition = "2021"
license = "Proprietary"
publish = false
description = "End-to-end tests that exercise built modules via arora-cli"

[lib]
path = "src/lib.rs"

# The integration tests spawn `arora-cli` against artifacts that the rest
# of the workspace produces at known paths under <workspace>/target. We
# intentionally do NOT declare bindeps or path build-deps on those crates:
# bindeps on workspace members that expose a cdylib (arora, polly) produce
# duplicate compilation units and the cargo "output filename collision"
# warnings (cargo#6313). The expected workflow is:
#
#     cargo build --workspace
#     cargo test -p arora-integration-tests
#
# The first command builds arora-cli, the module artifacts, and the wasm
# guests. The second runs the tests against those artifacts.

[dev-dependencies]
anyhow = "1"

# Force wasm builds of the modules the integration tests load. The crates
# themselves now build for the host by default (so `cargo test -p
# <module>` can iterate natively), and the wasm artifact is produced via
# these bindeps under target/wasm32-wasip1/debug/.
[build-dependencies]
behavior-tree-nodes = { path = "../modules/behavior-tree-nodes", artifact = "cdylib", target = "wasm32-wasip1" }
test-rust-wasm = { path = "../modules/test-rust-wasm", artifact = "cdylib", target = "wasm32-wasip1" }
