[package]
name = "arora"
version = "0.1.0"
authors = ["Braden McDorman <bmcdorman@gmail.com>"]
edition = "2021"

[lib]
crate-type = ["rlib"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = ["wasmtime-host", "native-host"]
# Native host using wasmtime to instantiate guest modules.
wasmtime-host = ["dep:wasmtime", "dep:wasmtime-wasi"]
# Native host using libloading to load .so/.dylib modules.
native-host = ["dep:libloading", "dep:tempfile"]

[dependencies]
anyhow = "*"
arora-buffers = { path = "../arora-buffers" }
arora-types = "1"
async-trait = "0.1"
bytes = "1"
derive_more = { version = "2", features = ["display", "error", "from"] }
lazy_static = "*"
rand = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["serde", "v4"] }

# Native-only optional deps. Disabled when targeting wasm32 (browser host).
libloading = { version = "0.7", optional = true }
tempfile = { version = "3", optional = true }
wasmtime = { version = "31", features = ["async"], optional = true }
wasmtime-wasi = { version = "31", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
wasm-bindgen-futures = "0.4"
serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = ["console"] }
# Browser RNG backend for `rand` (used in CallableId generation).
# `rand 0.10` depends on getrandom 0.4, so this must track that major
# version: enabling `wasm_js` on the 0.4 copy is what lets getrandom build
# for wasm32-unknown-unknown. The matching `--cfg getrandom_backend="wasm_js"`
# rustflag is set in .cargo/config.toml for that target.
getrandom = { version = "0.4", features = ["wasm_js"] }

[build-dependencies]
cbindgen = "0.20"

[dev-dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.8"
uuid = { version = "1", features = ["serde", "v4"] }
