[package]
name = "arora"
version = "0.1.0"
edition = "2021"
description = "Opinionated Arora runtime: an engine pre-wired with the native behavior-tree control nodes and the Semio backend."
license = "MIT"

[lib]
name = "arora"
path = "src/lib.rs"

[[bin]]
name = "arora"
path = "src/main.rs"
# The binary is native-only (Tokio runtime + filesystem). On wasm, build the
# library with --no-default-features.
required-features = ["native"]

# A worked example of a device-specific arora (custom HAL injected into
# arora::launch). Native-only, like the binary.
[[example]]
name = "device"
required-features = ["native"]

[features]
default = ["native"]
# Native build: the wasmtime + dynamic-library engine hosts and the binary. Build
# for wasm32 with --no-default-features (the browser host is selected by target
# cfg).
native = [
    "dep:tokio",
    "dep:studio-bridge-device-client",
    "dep:firestore-stream",
    # The headless device runner (token storage + crypto, app-data dir, logging).
    # Kept optional + native-only so the wasm build of the library stays lean.
    "dep:crypto_secretbox",
    "dep:dirs",
    "dep:rustls",
    "dep:env_logger",
    "dep:log",
    "arora-engine/wasmtime-host",
    "arora-engine/native-host",
]

[dependencies]
arora-engine = { path = "../arora-engine", default-features = false }
arora-behavior-tree = { path = "../arora-behavior-tree" }
arora-behavior = { path = "../arora-behavior" }
arora-types = { path = "../arora-types", version = "1.4" }
anyhow = "*"
tokio = { version = "1", features = ["rt-multi-thread", "macros"], optional = true }
uuid = { version = "1", features = ["serde", "v4"] }
# The three interfaces the runtime loop wires around the shared state.
arora-hal = { path = "../arora-hal" }
arora-bridge = { path = "../arora-bridge" }
arora-simple-data-store = { path = "../arora-simple-data-store" }
futures = "0.3"
# The default Bridge implementation (the studio-bridge Zenoh connector) and the
# Firebase config it needs. Native-only (zenoh/firestore) and optional, so the
# wasm build of the library stays lean. arora bundles these so a device-specific
# binary only has to provide its own HAL.
studio-bridge-device-client = { git = "https://github.com/semio-ai/studio-bridge.git", branch = "main", optional = true }
firestore-stream = { git = "https://github.com/semio-ai/studio-bridge.git", branch = "main", optional = true }
# Headless device-runner deps (native-only, optional). Versions track
# studio-bridge/headless, the runner this is ported from.
crypto_secretbox = { version = "0.1.1", optional = true }
dirs = { version = "6", optional = true }
env_logger = { version = "0.11", optional = true }
log = { version = "0.4", optional = true }
rustls = { version = "0.23.27", default-features = false, features = ["ring"], optional = true }

[dev-dependencies]
async-trait = "0.1"
# `time` (tests only): the runtime-loop tests sleep between `step`s to give the
# spawned io pump wall-clock time to deliver events. The runtime itself needs no
# timers (the pump is futures-only).
tokio = { version = "1", features = ["time"] }
