[package]
name = "arora"
version = "0.1.0"
authors = ["Braden McDorman <bmcdorman@gmail.com>"]
edition = "2018"

[lib]
crate-type = [ "cdylib", "rlib" ]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
arora-buffers = { path = "../arora-buffers" }
arora-index = { path = "../arora-index" }
arora-schema = { path = "../arora-schema" }
lazy_static = "*"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
derive_more = "*"
flatbuffers = "2.0.0"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
anyhow = "*"
uuid = { version = "0.8", features = ["serde", "v4"] }
bytes = "1"

[build-dependencies]
cbindgen = "0.20.0"

[dev-dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.8"
uuid = { version = "0.8", features = ["serde", "v4"] }
