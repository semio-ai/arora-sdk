[package]
name = "arora"
version = "0.1.0"
edition = "2021"
description = "Opinionated Arora runtime: an engine pre-wired with the behavior-tree module and the Semio backend."
license = "MIT"

[lib]
name = "arora"
path = "src/lib.rs"

[[bin]]
name = "arora"
path = "src/main.rs"
# The binary is native-only (Tokio runtime + filesystem). On wasm, build the
# library with --no-default-features.
required-features = ["native"]

# A worked example of a device-specific arora (custom HAL injected into
# arora::launch). Native-only, like the binary.
[[example]]
name = "device"
required-features = ["native"]

[features]
default = ["native"]
# Native build: the wasmtime + dynamic-library engine hosts and the binary. Build
# for wasm32 with --no-default-features (the browser host is selected by target
# cfg).
native = [
    "dep:tokio",
    "dep:behavior-tree-nodes",
    "arora-engine/wasmtime-host",
    "arora-engine/native-host",
]

[dependencies]
arora-engine = { path = "../arora-engine", default-features = false }
arora-behavior-tree = { path = "../arora-behavior-tree" }
arora-module-core = { path = "../arora-module-authoring/core" }
arora-registry = { path = "../arora-registry" }
arora-types = { path = "../arora-types", version = "1.4" }
# The Semio backend (module freezing / records).
semio-record = { git = "https://github.com/semio-ai/semio-record.git", branch = "main" }
anyhow = "*"
serde_yaml = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "macros"], optional = true }
uuid = { version = "1", features = ["serde", "v4"] }
# The three interfaces the runtime loop wires around the shared state.
arora-hal = { path = "../arora-hal" }
arora-bridge = { path = "../arora-bridge" }
arora-simple-data-store = { path = "../arora-simple-data-store" }
futures = "0.3"
# Embeds the behavior-tree type records so they load without a filesystem (wasm).
include_dir = "0.7"

[build-dependencies]
# The behavior-tree node implementations, built as a wasm artifact and embedded
# at build time (build.rs re-exports the path; lib.rs include_bytes! it). Build
# `arora` as a workspace member (it is in default-members), not as a standalone
# `-p arora` leaf, or arora-types/uuid get duplicated across the normal/build
# feature contexts.
#
# Optional + behind `native` so the wasm build excludes it; on wasm the BT-nodes
# bytes are supplied at runtime (`Arora::start_with_nodes`).
behavior-tree-nodes = { path = "../../modules/behavior-tree-nodes", artifact = "cdylib", target = "wasm32-wasip1", optional = true }

[dev-dependencies]
async-trait = "0.1"
# `time` (tests only): the runtime-loop tests sleep between `step`s to give the
# spawned io pump wall-clock time to deliver events. The runtime itself needs no
# timers (the pump is futures-only).
tokio = { version = "1", features = ["time"] }
