[package]
name = "arora-module-core"
version = "0.2.0"
edition = "2021"
description = "Module analysis and resolution for Arora module authoring."
license = "MIT"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
arora-registry = { path = "../../arora-registry", version = "0.1" }
arora-types = { path = "../../arora-types", version = "1.6" }
arora-vfs = { path = "../../arora-vfs", version = "0.1" }
bytes = "1"
convert_case = "0.11"
derive_more = { version = "2", features = ["display"] }
semver = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt", "macros", "io-util"] }
uuid = "1"

[dev-dependencies]
serde_yaml = "0.9"
uuid = { version = "1", features = ["serde", "v4"] }
