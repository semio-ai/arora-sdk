[package]
name = "arora-module-cli"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
arora-module-core = { path = "../core" }
arora-registry = { path = "../../arora-registry" }
arora-registry-remote = { path = "../../arora-registry-remote" }
arora-types = { path = "../../arora-types", version = "1.4" }
arora-vfs = { path = "../../arora-vfs" }
semio-client = { git = "https://github.com/semio-ai/semio-client.git", branch = "main" }
anyhow = "*"
clap = { version = "3", features = ["derive"] }
env_logger = "0.11"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
reqwest = "0.13"
tokio = { version = "1", features = ["full"] }
url = "2"
uuid = { version = "1", features = ["serde", "v4"] }
