[package]
name = "arora-module-rust"
version = "0.1.1"
edition = "2021"
description = "Rust source generation for Arora modules (types and bindings from type records)."
license = "MIT"
readme = "readme.md"
include = ["/src"]

[dependencies]
arora-module-core = { path = "../core", version = "0.1" }
arora-registry = { path = "../../arora-registry", version = "0.1" }
arora-types = { path = "../../arora-types", version = "1.6" }
arora-vfs = { path = "../../arora-vfs", version = "0.1" }
anyhow = "1"
async-recursion = "1"
clap = { version = "3", features = ["derive"] }
convert_case = "0.11"
derive_more = "2"
itertools = "0.14"
lazy_static = "1"
proc-macro2 = "1"
quote = "1"
semver = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "io-util", "io-std"] }
uuid = { version = "1", features = ["serde", "v4"] }
