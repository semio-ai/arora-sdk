[package]
name = "arora-module-core"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
semio-record = { git = "https://github.com/semio-ai/semio-entity.git", branch = "master" }
semio-client = { git = "https://github.com/semio-ai/semio-client.git", branch = "master" }
arora-registry = { path = "../arora-registry" }
arora-schema = { path = "../arora-schema" }
bytes = "1"
derive_more = "*"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
uuid = "*"

[dev-dependencies]
serde_yaml = "0.8"
uuid = { version = "0.8", features = ["serde", "v4"] }
