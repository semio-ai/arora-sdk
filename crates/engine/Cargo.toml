[package]
name = "engine"
version = "0.1.0"
authors = ["Braden McDorman <bmcdorman@gmail.com>"]
edition = "2018"
crate-type = ["cdylib"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
wasmtime = { version = "0.33.0", features = ["async"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
derive_more = "*"
flatbuffers = "2.0.0"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
engine-schema = { path = "../engine-schema" }
anyhow = "*"
uuid = { version = "0.8", features = ["serde", "v4"] }


[build-dependencies]
cbindgen = "0.20.0"