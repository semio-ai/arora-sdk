[package]
name = "arora-registry"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
semio-record = { git = "ssh://git@github.com/semio-ai/semio-entity.git", branch = "master" }
semio-client = { git = "ssh://git@github.com/semio-ai/semio-client.git", branch = "master" }
anyhow = "*"
arora-schema = { path = "../arora-schema" }
derive_more = "*"
reqwest = "0.11"
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.8"
tokio = { version = "1", features = ["full"] }
url = "2"
uuid = { version = "0.8", features = ["serde", "v4"] }
