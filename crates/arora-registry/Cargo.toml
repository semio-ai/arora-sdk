[package]
name = "arora-registry"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
semio-record = { git = "https://github.com/semio-ai/semio-record.git", branch = "update" }
semio-client = { git = "https://github.com/semio-ai/semio-client.git", branch = "update" }
anyhow = "*"
arora-types = "1"
async-trait = "0.1"
derive_more = "2"
reqwest = { version = "0.11", default-features = false, features = [
  "rustls-tls",
] }
semver = { version = "1.0.5", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.8"
tokio = { version = "1", features = ["full"] }
url = "2"
uuid = { version = "1", features = ["serde", "v4"] }
