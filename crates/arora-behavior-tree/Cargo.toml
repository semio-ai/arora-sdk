[package]
name = "arora-behavior-tree"
version = "0.0.1"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
path = "src/behavior_tree.rs"

[dependencies]
arora = { path = "../arora" }
arora-buffers = { path = "../arora-buffers" }
arora-index = { path = "../arora-index" }
arora-schema = { path = "../arora-schema" }
lazy_static = "*"
quick-xml = "0.20.0"
serde = { version = "1.0", features = ["derive"] }
uuid = { version = "0.8", features = ["serde", "v4"] }
derive_more = "*"

[dev-dependencies]
anyhow = "*"
arora-registry = { path = "../arora-registry" }
assert_float_eq = "1.1.3"
convert_case = "0.5"
serde_yaml = "0.8"
tokio = { version = "1", features = ["full"] }
url = "2"

[build-dependencies]
anyhow = "*"
arora-behavior-tree-types = { path = "../arora-behavior-tree-types" }
arora-registry = { path = "../arora-registry" }
arora-module-core = { path = "../arora-module-core" }
arora-module-rust = { path = "../arora-module-rust" }
tokio = { version = "1", features = ["full"] }
