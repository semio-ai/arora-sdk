<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Arora engine – module explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: ui-monospace, monospace;
      margin: 0;
      padding: 0;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    header h1 { margin: 0; font-size: 1.1rem; color: #a0aec0; }
    header span { font-size: 0.8rem; color: #4a5568; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      height: calc(100vh - 3rem);
    }

    /* ── left panel: actions ───────────────────────────── */
    .actions {
      padding: 1.25rem 1.5rem;
      border-right: 1px solid #2d3748;
      overflow-y: auto;
    }

    h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .08em;
         color: #718096; margin: 0 0 .75rem; }

    section { margin-bottom: 1.75rem; }

    .file-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      margin-bottom: .5rem;
    }
    .file-label {
      display: flex;
      flex-direction: column;
      gap: .25rem;
      font-size: .75rem;
      color: #718096;
    }
    .file-label input[type=file] {
      font: inherit;
      font-size: .75rem;
      color: #e2e8f0;
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 4px;
      padding: .3rem .4rem;
      cursor: pointer;
    }
    .file-label input[type=file]::file-selector-button {
      background: #2d3748;
      color: #e2e8f0;
      border: none;
      padding: .2rem .5rem;
      border-radius: 3px;
      cursor: pointer;
      font: inherit;
      font-size: .7rem;
      margin-right: .4rem;
    }

    button {
      padding: .4rem .9rem;
      font: inherit;
      font-size: .82rem;
      background: #2d3748;
      color: #e2e8f0;
      border: 1px solid #4a5568;
      border-radius: 4px;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover:not(:disabled) { background: #3d4f67; }
    button:disabled { opacity: .4; cursor: default; }
    button.primary { background: #2b6cb0; border-color: #3182ce; }
    button.primary:hover:not(:disabled) { background: #3182ce; }

    .btn-row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }

    .load-status {
      font-size: .75rem;
      color: #68d391;
      min-height: 1rem;
      margin-top: .4rem;
    }
    .load-status.error { color: #fc8181; }

    label.inline { font-size: .82rem; color: #a0aec0; }
    input[type=number] {
      width: 5rem;
      padding: .25rem .4rem;
      font: inherit;
      font-size: .82rem;
      background: #1a202c;
      color: #e2e8f0;
      border: 1px solid #2d3748;
      border-radius: 4px;
    }

    pre#out {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 4px;
      padding: .75rem;
      font-size: .78rem;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 14rem;
      overflow-y: auto;
      color: #a0aec0;
      margin: 0;
    }

    /* ── right panel: module list ──────────────────────── */
    .module-panel {
      overflow-y: auto;
      padding: 1.25rem 1rem;
      background: #0d1117;
    }

    .module-panel h2 { margin-bottom: 1rem; }

    .module-card {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 6px;
      padding: .75rem .9rem;
      margin-bottom: .75rem;
    }
    .module-card .mod-name {
      font-size: .9rem;
      font-weight: 600;
      color: #63b3ed;
      margin-bottom: .25rem;
    }
    .module-card .mod-id {
      font-size: .65rem;
      color: #4a5568;
      margin-bottom: .6rem;
      word-break: break-all;
    }
    .fn-list { margin: 0; padding: 0; list-style: none; }
    .fn-list li {
      font-size: .73rem;
      color: #cbd5e0;
      padding: .2rem 0;
      border-top: 1px solid #2d3748;
    }
    .fn-list li:first-child { border-top: none; }
    .fn-name { color: #f6e05e; }
    .fn-param { color: #68d391; }
    .fn-ret { color: #fc8181; }
    .fn-param-mut { color: #ed8936; }
    .fn-id { font-size: .6rem; color: #4a5568; display: block; }

    #no-modules {
      font-size: .8rem;
      color: #4a5568;
      text-align: center;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Arora Engine</h1>
    <span>module explorer</span>
  </header>

  <div class="layout">
    <!-- left: actions -->
    <div class="actions">

      <section>
        <h2>Load module from file</h2>
        <div class="file-row">
          <label class="file-label">
            Module YAML
            <input id="yaml-file" type="file" accept=".yaml,.yml" />
          </label>
          <label class="file-label">
            WASM binary
            <input id="wasm-file" type="file" accept=".wasm" />
          </label>
        </div>
        <div class="btn-row">
          <button id="load-file-btn" class="primary">Load</button>
        </div>
        <div id="load-file-status" class="load-status"></div>
      </section>

      <section>
        <h2>Built-in modules</h2>
        <div class="btn-row">
          <button id="load-test-wasm-btn">Load test-rust-wasm</button>
          <button id="load-bt-nodes-btn">Load behavior-tree-nodes</button>
        </div>
        <div id="load-builtin-status" class="load-status"></div>
      </section>

      <section>
        <h2>Quick call</h2>
        <div class="btn-row">
          <button id="run" disabled>ping / succeed / cos</button>
          <label class="inline">angle: <input id="angle" type="number" step="0.1" value="0" /></label>
        </div>
        <pre id="out">(load test-rust-wasm first)</pre>
      </section>

    </div>

    <!-- right: module introspection panel -->
    <div class="module-panel">
      <h2>Loaded Modules</h2>
      <div id="modules-list">
        <div id="no-modules">No modules loaded yet.</div>
      </div>
    </div>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
