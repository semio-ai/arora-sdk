[package]
name = "arora-web"
version = "0.1.0"
edition = "2021"
license = "Proprietary"
description = "wasm-bindgen entry point for running the Arora engine in a browser"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
arora = { path = "../arora", default-features = false }
arora-types = "1"
wasm-bindgen = "0.2.122"
js-sys = "0.3.99"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
console_error_panic_hook = "0.1"
uuid = { version = "1", features = ["serde", "v4"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"
serde_yaml = "0.9"
