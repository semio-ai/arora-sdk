[package]
name = "arora-cli"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
arora = { path = "../arora" }
arora-buffers = { path = "../arora-buffers" }
arora-module-core = { path = "../arora-module-core" }
arora-registry = { path = "../arora-registry" }
semio-client = { git = "https://github.com/semio-ai/semio-client.git", branch = "master" }
semio-record = { git = "https://github.com/semio-ai/semio-record.git", branch = "master" }
anyhow = "*"
clap = { version = "3", features = ["derive"] }
futures = "0.3"
reqwest = { version = "0.11", default-features = false, features = [
  "rustls-tls",
] }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.8"
tokio = { version = "1", features = ["full"] }
url = "2"
uuid = { version = "1", features = ["serde", "v4"] }
