[workspace]
resolver = "2"

members = [
  "crates/arora",
  "crates/arora-buffers",
  "crates/arora-module-core",
  "crates/arora-module-cli",
  "crates/arora-module-cpp",
  "crates/arora-module-rust",
  "crates/arora-registry",
  "crates/arora-cli",
  "crates/arora-util",
  "crates/arora-vfs",
  "crates/arora-web",
  "crates/wasi-sdk",
  "modules/nao",
  "modules/polly",
  "modules/test-rust-wasm",
  "modules/test-rust-component",
  "modules/test-cpp",
  "modules/test-cpp-2",
  "tests",
]

# NAO module is opt-in: it requires i686-unknown-linux-musl cross-toolchain
# (Mac: brew install messense/macos-cross-toolchains/i686-unknown-linux-musl)
# Build explicitly with: cargo build -p arora-nao
default-members = [
  "crates/arora",
  "crates/arora-buffers",
  "crates/arora-module-core",
  "crates/arora-module-cli",
  "crates/arora-module-cpp",
  "crates/arora-module-rust",
  "crates/arora-registry",
  "crates/arora-cli",
  "crates/arora-util",
  "crates/arora-vfs",
  "crates/arora-web",
  "crates/wasi-sdk",
  "tests",
]

[profile.release]
lto = "thin"
debug = 1

# arora-behavior-tree (git-dep at @extract) references engine crates via
# arora-engine.git; redirect those to the local workspace so they unify with
# the path crates instead of compiling a second copy.
[patch."https://github.com/semio-ai/arora-engine.git"]
arora-buffers = { path = "crates/arora-buffers" }
arora-util = { path = "crates/arora-util" }
arora-vfs = { path = "crates/arora-vfs" }
arora-registry = { path = "crates/arora-registry" }
arora-module-core = { path = "crates/arora-module-core" }
arora-module-rust = { path = "crates/arora-module-rust" }
