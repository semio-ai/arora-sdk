[workspace]
resolver = "2"

members = [
  "crates/arora",
  "crates/arora-buffers",
  "crates/arora-module-core",
  "crates/arora-module-cli",
  "crates/arora-module-cpp",
  "crates/arora-module-rust",
  "crates/arora-registry",
  "crates/arora-cli",
  "crates/arora-util",
  "crates/arora-vfs",
  "crates/wasi-sdk",
  "modules/test-rust-wasm",
  "modules/test-rust-component",
  "modules/test-cpp",
  "modules/test-cpp-2",
  "tests",
]

default-members = [
  "crates/arora",
  "crates/arora-buffers",
  "crates/arora-module-core",
  "crates/arora-module-cli",
  "crates/arora-module-cpp",
  "crates/arora-module-rust",
  "crates/arora-registry",
  "crates/arora-cli",
  "crates/arora-util",
  "crates/arora-vfs",
  "crates/wasi-sdk",
  "tests",
]

[patch.crates-io]
arora-types = { git = "https://github.com/semio-ai/arora-types.git", branch = "feat/record-traits" }

[profile.release]
lto = "thin"
debug = 1

