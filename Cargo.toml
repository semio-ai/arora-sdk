[package]
name = "arora-types"
version = "1.0.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
serde = { version = "1", features = ["derive"] }
derive_more = { version = "2", features = ["display"] }
semver = "1"
uuid = { version = "1", features = ["serde", "v4"] }
lazy_static = "*"

[dev-dependencies]
json5 = "0.4"
pretty_assertions = "1"
serde_yaml = "0.8"
