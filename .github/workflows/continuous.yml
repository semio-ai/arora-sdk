name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure cargo git access
        run: |
          mkdir -p ~/.cargo
          echo "net.git-fetch-with-cli = true" >> ~/.cargo/config.toml
          echo "${{ secrets.SEMIO_GIT_CREDENTIAL }}" > ~/.my-credentials
          git config --global credential.helper 'store --file ~/.my-credentials'

      # rust-toolchain.toml pins nightly + wasm32-wasip1;
      # add wasm32-unknown-unknown for the browser executor build.
      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # `cargo test --release` builds the wasm32-wasip1 guests automatically
      # via the behavior-tree and integration-test crates' artifact
      # dependencies (bindeps); the tests locate them through the forwarded
      # CARGO_CDYLIB_FILE_* env vars (see arora-behavior-tree/build.rs and
      # tests/build.rs). No separate guest build step is needed.
      - name: Test (native + wasm modules via wasmtime)
        run: cargo test --release

      # Install wasm-pack for browser tests
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Browser tests in headless Firefox; wasm-pack builds arora-web's
      # bindep'd wasm guest, and wasm-compatible engine.
      - name: Run arora-web browser test (headless Firefox)
        run: wasm-pack test --headless --firefox --release crates/arora-web

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure cargo git access
        run: |
          mkdir -p ~/.cargo
          echo "net.git-fetch-with-cli = true" >> ~/.cargo/config.toml
          echo "${{ secrets.SEMIO_GIT_CREDENTIAL }}" > ~/.my-credentials
          git config --global credential.helper 'store --file ~/.my-credentials'

      - name: Install rustfmt and clippy
        run: rustup component add rustfmt clippy

      # rust-toolchain.toml pins nightly + wasm32-wasip1; the wasm guest
      # bindeps are built while checking, so the extra target must be present.
      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # Clippy runs first because compiling executes the build scripts that
      # generate each crate's `src/arora_generated.rs`. `cargo fmt` follows the
      # `mod arora_generated;` declarations, so without those files present it
      # fails to resolve the module before checking anything.
      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/workflows/markdown-link-check-config.json'
