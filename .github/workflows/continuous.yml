name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure cargo git access
        run: |
          mkdir -p ~/.cargo
          echo "net.git-fetch-with-cli = true" >> ~/.cargo/config.toml
          echo "${{ secrets.SEMIO_GIT_CREDENTIAL }}" > ~/.my-credentials
          git config --global credential.helper 'store --file ~/.my-credentials'

      # rust-toolchain.toml pins nightly + wasm32-wasip1 + i686-musl;
      # add wasm32-unknown-unknown for the browser executor build.
      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build workspace
        run: cargo build --workspace

      # Force the wasm32-wasip1 guest module builds before `cargo test`.
      # The arora-behavior-tree tests load the .wasm artifacts from
      # <workspace>/target/wasm32-wasip1/debug/.
      - name: Build wasm guest modules (wasm32-wasip1)
        run: |
          cargo build -p test-rust-wasm --target wasm32-wasip1
          cargo build -p behavior-tree-nodes --target wasm32-wasip1

      # `cargo test --all` covers the wasm-loading-via-wasmtime
      # integration tests under `tests/`. Bindeps drag in the
      # wasm32-wasip1 build of test-rust-wasm + behavior-tree-nodes.
      - name: Test workspace (native + wasm modules via wasmtime)
        run: cargo test --all

      # Verify arora builds standalone for the browser target with no
      # native host features pulled in.
      - name: Build arora for wasm32-unknown-unknown
        run: cargo build -p arora --target wasm32-unknown-unknown --no-default-features

  browser_test:
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
      - uses: actions/checkout@v4

      - name: Configure cargo git access
        run: |
          mkdir -p ~/.cargo
          echo "net.git-fetch-with-cli = true" >> ~/.cargo/config.toml
          echo "${{ secrets.SEMIO_GIT_CREDENTIAL }}" > ~/.my-credentials
          git config --global credential.helper 'store --file ~/.my-credentials'

      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Firefox + geckodriver
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox firefox-geckodriver
          firefox --version
          geckodriver --version

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      # The arora-web browser test consumes the wasm32-wasip1 build of
      # test-rust-wasm; force it via the integration-tests bindep.
      - name: Build test guest wasm (wasm32-wasip1)
        run: cargo build -p arora-integration-tests --tests

      - name: Run arora-web browser test (headless Firefox)
        run: wasm-pack test --headless --firefox crates/arora-web

  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/workflows/markdown-link-check-config.json'
