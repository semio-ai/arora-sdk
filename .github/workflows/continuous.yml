name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - cargo-first-build
      - feat/guest-error-signaling
      - feat/web-demo-introspection
      - feat/type-registry

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships ~14 GB free; Rust multi-target --release builds
      # need ~35 GB. Stripping irrelevant pre-installed toolchains (Android,
      # .NET, Haskell) recovers ~25 GB before we start.
      # large-packages: false preserves the pre-installed Firefox needed for
      # wasm-pack --headless --firefox browser tests.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Configure cargo git access
        run: |
          mkdir -p ~/.cargo
          echo "net.git-fetch-with-cli = true" >> ~/.cargo/config.toml
          echo "${{ secrets.SEMIO_GIT_CREDENTIAL }}" > ~/.my-credentials
          git config --global credential.helper 'store --file ~/.my-credentials'

      # rust-toolchain.toml pins nightly + wasm32-wasip1;
      # add wasm32-unknown-unknown for the browser executor build.
      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build workspace
        run: cargo build --release

      # `cargo test --release` builds the wasm32-wasip1 guests automatically
      # via the behavior-tree and integration-test crates' artifact
      # dependencies (bindeps); the tests locate them through the forwarded
      # CARGO_CDYLIB_FILE_* env vars (see arora-behavior-tree/build.rs and
      # tests/build.rs). No separate guest build step is needed.
      - name: Test workspace (native + wasm modules via wasmtime)
        run: cargo test --release

      # Verify arora builds standalone for the browser target with no
      # native host features pulled in.
      - name: Build arora for wasm32-unknown-unknown
        run: cargo build -p arora --target wasm32-unknown-unknown --no-default-features --release

      # Install wasm-pack for browser tests
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Run browser tests in headless Firefox
      - name: Run arora-web browser test (headless Firefox)
        run: wasm-pack test --headless --firefox --release crates/arora-web

  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/workflows/markdown-link-check-config.json'
