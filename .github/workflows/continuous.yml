name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure cargo git access
        run: |
          mkdir -p ~/.cargo
          echo "net.git-fetch-with-cli = true" >> ~/.cargo/config.toml
          echo "${{ secrets.GH_PAT_STUDIO_ARORA }}" > ~/.my-credentials
          git config --global credential.helper 'store --file ~/.my-credentials'

      - name: Cache cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # `cargo test --release` builds the wasm32-wasip1 guests automatically
      # via the integration-test crate's artifact
      # dependencies (bindeps); the tests locate them through the forwarded
      # CARGO_CDYLIB_FILE_* env vars (see tests/build.rs). No separate guest build step is needed.
      - name: Test (native + wasm modules via wasmtime)
        run: cargo test --release

      # Lint in this job rather than a parallel one: the test build above has
      # already fetched every dependency and run the build scripts that emit
      # each crate's src/arora_generated.rs. clippy has to compile regardless,
      # and `cargo fmt --check` errors on the unresolved `mod arora_generated;`
      # when those files are absent — so folding both in reuses that work
      # instead of paying for a second runner to redo the bindep/codegen build.
      - name: Clippy
        run: cargo clippy --release -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      # The engine's web host (executor::browser) only compiles for wasm32, so
      # it never gets exercised by the native build above. Build and run it
      # here, in a real headless browser, so regressions in the browser host
      # are caught at the engine level rather than downstream.
      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # geckodriver + firefox are preinstalled on ubuntu-latest.
      # --no-default-features drops the wasmtime/native hosts so `arora` builds
      # for wasm32; the test loads the test-rust-wasm guest through
      # BrowserExecutor and dispatches it (see crates/arora/tests/browser.rs).
      - name: Browser executor test (headless Firefox)
        run: wasm-pack test --headless --firefox crates/arora --no-default-features --test browser

  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/workflows/markdown-link-check-config.json'
