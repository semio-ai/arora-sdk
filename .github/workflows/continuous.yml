name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure cargo git access
        run: |
          mkdir -p ~/.cargo
          echo "net.git-fetch-with-cli = true" >> ~/.cargo/config.toml
          echo "${{ secrets.GH_PAT_STUDIO_ARORA }}" > ~/.my-credentials
          git config --global credential.helper 'store --file ~/.my-credentials'

      # rust-toolchain.toml pins nightly + wasm32-wasip1;
      # add wasm32-unknown-unknown for the browser executor build.
      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # `cargo test --release` builds the wasm32-wasip1 guests automatically
      # via the behavior-tree and integration-test crates' artifact
      # dependencies (bindeps); the tests locate them through the forwarded
      # CARGO_CDYLIB_FILE_* env vars (see arora-behavior-tree/build.rs and
      # tests/build.rs). No separate guest build step is needed.
      - name: Test (native + wasm modules via wasmtime)
        run: cargo test --release

      # Lint in this job rather than a parallel one: the test build above has
      # already fetched every dependency and run the build scripts that emit
      # each crate's src/arora_generated.rs. clippy has to compile regardless,
      # and `cargo fmt --check` errors on the unresolved `mod arora_generated;`
      # when those files are absent — so folding both in reuses that work
      # instead of paying for a second runner to redo the bindep/codegen build.
      - name: Clippy
        run: cargo clippy --release -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      # Install wasm-pack for browser tests
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Browser tests in headless Firefox; wasm-pack builds arora-web's
      # bindep'd wasm guest, and wasm-compatible engine.
      - name: Run arora-web browser test (headless Firefox)
        run: wasm-pack test --headless --firefox --release crates/arora-web

  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/workflows/markdown-link-check-config.json'
