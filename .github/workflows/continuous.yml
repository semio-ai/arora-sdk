name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches:
      - master
      - cargo-first-build
      - feat/guest-error-signaling
      - feat/web-demo-introspection

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Configure cargo git access
        run: |
          mkdir -p ~/.cargo
          echo "net.git-fetch-with-cli = true" >> ~/.cargo/config.toml
          echo "${{ secrets.SEMIO_GIT_CREDENTIAL }}" > ~/.my-credentials
          git config --global credential.helper 'store --file ~/.my-credentials'

      # rust-toolchain.toml pins nightly + wasm32-wasip1 + i686-musl;
      # add wasm32-unknown-unknown for the browser executor build.
      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build workspace
        run: cargo build --workspace --exclude arora-nao --release

      # Force the wasm32-wasip1 guest module builds before `cargo test`.
      # The arora-behavior-tree tests load the .wasm artifacts from
      # <workspace>/target/wasm32-wasip1/release/ (cfg!(debug_assertions)
      # is off under --release, so the loader picks the release subdir).
      - name: Build wasm guest modules (wasm32-wasip1)
        run: |
          cargo build -p test-rust-wasm --target wasm32-wasip1 --release
          cargo build -p behavior-tree-nodes --target wasm32-wasip1 --release

      # `cargo test --all` covers the wasm-loading-via-wasmtime
      # integration tests under `tests/`. Bindeps drag in the
      # wasm32-wasip1 build of test-rust-wasm + behavior-tree-nodes.
      - name: Test workspace (native + wasm modules via wasmtime)
        run: cargo test --workspace --exclude arora-nao --release

      # Verify arora builds standalone for the browser target with no
      # native host features pulled in.
      - name: Build arora for wasm32-unknown-unknown
        run: cargo build -p arora --target wasm32-unknown-unknown --no-default-features --release

  browser_test:
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Configure cargo git access
        run: |
          mkdir -p ~/.cargo
          echo "net.git-fetch-with-cli = true" >> ~/.cargo/config.toml
          echo "${{ secrets.SEMIO_GIT_CREDENTIAL }}" > ~/.my-credentials
          git config --global credential.helper 'store --file ~/.my-credentials'

      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Firefox + geckodriver
        run: |
          # ubuntu-latest ships Firefox via snap; install geckodriver from
          # its GitHub release (the apt package "firefox-geckodriver" is
          # gone on noble).
          firefox --version
          GECKO_VERSION=v0.34.0
          curl -sSL "https://github.com/mozilla/geckodriver/releases/download/${GECKO_VERSION}/geckodriver-${GECKO_VERSION}-linux64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin
          geckodriver --version

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      # The arora-web browser test consumes the wasm32-wasip1 build of
      # test-rust-wasm; build it directly (release to match the host
      # release build and keep the cache hot).
      - name: Build test guest wasm (wasm32-wasip1)
        run: cargo build -p test-rust-wasm --target wasm32-wasip1 --release

      - name: Run arora-web browser test (headless Firefox)
        run: wasm-pack test --headless --firefox --release crates/arora-web

  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/workflows/markdown-link-check-config.json'
