# Pin nightly because the cargo-first build relies on -Z bindeps
# (artifact-dependencies) to depend on host tools (arora-module-cli) from
# crates that cross-compile for wasm32-wasip1.
# See docs/cargo-migration/PLAN.md.
[toolchain]
channel = "nightly-2026-05-27"
components = ["rustfmt", "clippy", "rust-src"]
targets = [
  "wasm32-wasip1",
]
