# Enable nightly cargo features used by this workspace.
#
# bindeps (RFC 3028, cargo issue #9096): artifact dependencies. Lets a
# build-dependency declare it wants the *binary* output of another crate,
# always built for the host, with the path exposed to build.rs via
# CARGO_BIN_FILE_<CRATE>_<BIN>. This is how cross-target crates reach the
# arora-module-cli code generator without a recursive cargo invocation.
#
# `per-package-target` (used by wasm-only modules to force wasm32-wasip1)
# is opted into per-crate via `cargo-features = ["per-package-target"]` in
# the consuming Cargo.toml; nightly cargo no longer accepts it here.
[unstable]
bindeps = true

# Cross-compilation linker for the NAO target. The NAO modules link C++
# (libqi, arora-cpp) compiled by the Homebrew i686-unknown-linux-musl
# cross-gcc, so Rust must use the matching linker. The brew formula
# provides the toolchain at /opt/homebrew/bin (Apple Silicon) — on Intel
# Macs override CARGO_TARGET_I686_UNKNOWN_LINUX_MUSL_LINKER.
[target.i686-unknown-linux-musl]
linker = "/opt/homebrew/bin/i686-unknown-linux-musl-gcc"
ar = "/opt/homebrew/bin/i686-unknown-linux-musl-ar"

# Runner for wasm32-wasip1 unit tests. Modules with `forced-target =
# "wasm32-wasip1"` (behavior-tree-nodes, test-rust-wasm) produce wasm
# binaries that cargo cannot execute directly; cargo test --all needs a
# runner to invoke them. wasmtime 33 matches the WASI SDK version used by
# the C++ guests. Install: `curl https://wasmtime.dev/install.sh -sSf | bash`.
[target.wasm32-wasip1]
runner = "wasmtime"
