[package]
name = "test-rust-wasm"
version = "0.1.0"
authors = ["Victor Paleologue <victor.paleologue@palaio.eu>"]
description = "A test module project compiled to wasm"
license = "Proprietary"
edition = "2021"
readme = "readme.md"

[lib]
crate-type = ["cdylib", "rlib"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
arora-buffers = { path = "../../crates/arora-buffers" }
arora-types = "1"
bytes = "1"
derive_more = "2"
serde = { version = "1", features = ["derive"] }
uuid = { version = "1", features = ["serde", "v4"] }

[dev-dependencies]
anyhow = "*"

[build-dependencies]
anyhow = "*"
arora-behavior-tree-types = { git = "https://github.com/semio-ai/arora-behavior-tree.git", branch = "extract" }
arora-module-core = { path = "../../crates/arora-module-core" }
arora-module-rust = { path = "../../crates/arora-module-rust" }
arora-registry = { path = "../../crates/arora-registry" }
tokio = { version = "1", features = ["full"] }
