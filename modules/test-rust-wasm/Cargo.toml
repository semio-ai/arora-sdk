[package]
name = "test-rust-wasm"
version = "0.1.0"
authors = ["Victor Paleologue <victor.paleologue@palaio.eu>"]
description = "A test module project compiled to wasm"
license = "Proprietary"
edition = "2021"

[lib]
crate-type = ["cdylib"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
arora-buffers = { path = "../../crates/arora-buffers" }
bytes = "1"
derive_more = "*"
serde = { version = "1", features = ["derive"] }
uuid = { version = "0.8", features = ["serde", "v4", "stdweb"] }

[dev-dependencies]
anyhow = "*"

[workspace]