[package]
name = "vizij-orchestrator-composed"
version = "0.1.0"
edition = "2021"
description = "Composed Arora module facade for Vizij animation and node graph modules"
license = "Proprietary"
readme = "readme.md"

[lib]
name = "arora_vizij_orchestrator_composed"
crate-type = ["cdylib", "rlib"]

[dependencies]
arora-buffers = { path = "../../crates/arora-buffers" }
arora-types = "1"
derive_more = "2"
indexmap = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["serde", "v4"] }
vizij-animation = { path = "../vizij-animation" }
vizij-api-core = { path = "../../../vizij-rs-vizij-engine-backend-experiment/crates/api/vizij-api-core" }
vizij-node-graph = { path = "../vizij-node-graph" }
vizij-orchestrator-core = { path = "../../../vizij-rs-vizij-engine-backend-experiment/crates/orchestrator/vizij-orchestrator-core" }
vizij-graph-core = { path = "../../../vizij-rs-vizij-engine-backend-experiment/crates/node-graph/vizij-graph-core" }

[dev-dependencies]
anyhow = "*"

[build-dependencies]
anyhow = "*"
arora-module-core = { path = "../../crates/arora-module-core" }
arora-module-rust = { path = "../../crates/arora-module-rust" }
arora-registry = { path = "../../crates/arora-registry" }
tokio = { version = "1", features = ["full"] }
