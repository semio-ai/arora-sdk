cargo-features = ["per-package-target"]

[package]
name = "behavior-tree-nodes"
version = "0.1.0"
authors = ["Victor Paleologue <victor.paleologue@palaio.eu>"]
description = "Core behavior tree nodes"
license = "Proprietary"
edition = "2021"
readme = "readme.md"
# This module is a wasm guest loaded by the engine. The arora_dispatch
# imports it references only resolve when targeting wasm. Use the nightly
# forced-target so the package always builds for wasm32-wasip1, even when
# the rest of the workspace is being built for the host.
forced-target = "wasm32-wasip1"

[lib]
crate-type = ["cdylib"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
arora-buffers = { path = "../../crates/arora-buffers" }
arora-types = "1"
bytes = "1"
derive_more = "2"
regex = "1"
serde = { version = "1", features = ["derive"] }
uuid = { version = "1", features = ["serde", "v4"] }

[dev-dependencies]
anyhow = "*"

[build-dependencies]
anyhow = "*"
arora-behavior-tree-types = { path = "../../crates/arora-behavior-tree-types" }
arora-module-core = { path = "../../crates/arora-module-core" }
arora-module-rust = { path = "../../crates/arora-module-rust" }
arora-registry = { path = "../../crates/arora-registry" }
tokio = { version = "1", features = ["full"] }
