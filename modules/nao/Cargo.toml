cargo-features = ["per-package-target"]

[package]
name = "arora-nao"
version = "0.1.0"
edition = "2021"
license = "Proprietary"
description = "NAO bridge module — cross-compiled for i686-unknown-linux-musl"
build = "build.rs"

# Building this crate requires:
#   - Mac: brew install messense/macos-cross-toolchains/i686-unknown-linux-musl
#   - Linux: i686-unknown-linux-musl-gcc in $PATH (or configured in .cargo/config.toml)
# Without the cross-toolchain, cargo build -p arora-nao will fail.

[features]
default = []
# Fetch and link the real libqi (Boost, OpenSSL, slow FetchContent) instead
# of the header-only stub. Adds ~10 min to a cold build.
real-libqi = []

[lib]
path = "src/lib.rs"

[build-dependencies]
anyhow = "1"
cmake = "0.1"
# Host tools used by the C++ codegen step. arora-module-cli locates
# arora-module-cpp as a sibling, so we stage both into one dir.
arora-module-cli = { path = "../../crates/arora-module-cli", artifact = "bin" }
arora-module-cpp = { path = "../../crates/arora-module-cpp", artifact = "bin" }
# Static libs linked into the NAO .so. The Mac Homebrew cross-gcc handles
# linking, so cargo builds these for the NAO target.
arora-buffers = { path = "../../crates/arora-buffers", artifact = "staticlib", target = "i686-unknown-linux-musl" }
arora-util = { path = "../../crates/arora-util", artifact = "staticlib", target = "i686-unknown-linux-musl" }
