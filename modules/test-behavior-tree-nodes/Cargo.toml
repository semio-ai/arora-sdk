[package]
name = "test-behavior-tree-nodes"
version = "0.1.0"
authors = ["Victor Paleologue <victor.paleologue@palaio.eu>"]
description = "Test/demo behavior-tree leaf and utility nodes (the basic control nodes are wired natively into arora-behavior-tree)"
license = "Proprietary"
edition = "2021"
readme = "readme.md"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
arora-buffers = { path = "../../crates/arora-buffers" }
arora-types = { path = "../../crates/arora-types", version = "2" }
bytes = "1"
derive_more = "2"
regex = "1"
serde = { version = "1", features = ["derive"] }
uuid = { version = "1", features = ["serde", "v4"] }

[dev-dependencies]
anyhow = "*"

[build-dependencies]
anyhow = "*"
arora-behavior-tree-types = { path = "../../crates/arora-behavior-tree-types" }
arora-module-core = { path = "../../crates/arora-module-authoring/core" }
arora-module-rust = { path = "../../crates/arora-module-authoring/rust" }
arora-registry = { path = "../../crates/arora-registry" }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
