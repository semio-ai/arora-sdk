[package]
name = "polly"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "*"
arora-buffers = { path = "../../crates/arora-buffers" }
arora-types = { path = "../../crates/arora-types", version = "2" }
aws-config = "1"
aws-sdk-polly = "1"
bytes = "1"
derive_more = "2"
lazy_static = "*"
soloud = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "io-util"] }
uuid = { version = "1", features = ["serde", "v4"] }

[dev-dependencies]
anyhow = "*"
arora-engine = { path = "../../crates/arora-engine" }
arora-behavior-tree = { path = "../../crates/arora-behavior-tree" }
arora-module-core = { path = "../../crates/arora-module-authoring/core" }
arora-registry = { path = "../../crates/arora-registry" }
arora-types = { path = "../../crates/arora-types", version = "2" }
convert_case = "0.11"
rand = "0.10"
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "io-util"] }
uuid = { version = "1", features = ["serde", "v4"] }
test-behavior-tree-nodes = { path = "../../modules/test-behavior-tree-nodes", artifact = "cdylib", target = "wasm32-wasip1" }

[build-dependencies]
anyhow = "*"
arora-behavior-tree-types = { path = "../../crates/arora-behavior-tree-types" }
arora-behavior-tree-types-yaml = { path = "../../crates/arora-behavior-tree-types-yaml" }
arora-module-core = { path = "../../crates/arora-module-authoring/core" }
arora-module-rust = { path = "../../crates/arora-module-authoring/rust" }
arora-registry = { path = "../../crates/arora-registry" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "io-util"] }
