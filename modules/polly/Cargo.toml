[package]
name = "polly"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "*"
arora-buffers = { path = "../../crates/arora-buffers" }
arora-types = "1"
aws-config = "0.11.0"
aws-sdk-polly = "0.11.0"
bytes = "1"
derive_more = "2"
lazy_static = "*"
soloud = "1"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["serde", "v4"] }

[build-dependencies]
anyhow = "*"
arora-behavior-tree-types = { path = "../../crates/arora-behavior-tree-types" }
arora-module-core = { path = "../../crates/arora-module-core" }
arora-module-rust = { path = "../../crates/arora-module-rust" }
arora-registry = { path = "../../crates/arora-registry" }
tokio = { version = "1", features = ["full"] }

[workspace]
