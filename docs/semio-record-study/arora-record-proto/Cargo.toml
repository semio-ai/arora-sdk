[package]
name = "arora-record-proto"
version = "0.0.0"
edition = "2021"
publish = false

# Prototype ONLY. Self-contained: std + serde + uuid + semver.
# Does NOT depend on semio-record or any private repo.

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["serde", "v4"] }
semver = { version = "1", features = ["serde"] }

[dev-dependencies]
pretty_assertions = "1"
